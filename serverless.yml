service: serverless-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 256
  timeout: 10
  environment:
    STAGE: ${self:provider.stage}
    LOG_LEVEL: info
  tracing:
    lambda: true
    apiGateway: true
  logs:
    httpApi: true
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: '*'
        - Effect: Allow
          Action:
            - cloudwatch:PutMetricData
          Resource: '*'

functions:
  getText:
    handler: src/handlers/getText.handler
    events:
      - httpApi:
          path: /hello
          method: GET

  getTime:
    handler: src/handlers/getTime.handler
    events:
      - httpApi:
          path: /server-time
          method: GET
