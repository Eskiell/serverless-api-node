service: serverless-api

frameworkVersion: '4'

provider:
  name: aws
  runtime: nodejs20.x
  profile: serverless-deploy
  stage: ${opt:stage, 'dev'}
  region: ${opt:region, 'us-east-1'}
  memorySize: 256
  timeout: 10
  environment:
    STAGE: ${self:provider.stage}

functions:
  getText:
    handler: src/handlers/getText.handler
    events:
      - httpApi:
          path: /hello
          method: GET

  getTime:
    handler: src/handlers/getTime.handler
    events:
      - httpApi:
          path: /server-time
          method: GET